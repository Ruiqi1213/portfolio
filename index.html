<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王瑞琪的作品集 | Portfolio</title>
    <style>
        /* 极简样式设计 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f7; /* 苹果风浅灰色背景 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            color: #1d1d1f;
            font-size: 24px;
            margin-bottom: 0.5rem;
        }

        p {
            color: #86868b;
            margin-bottom: 2rem;
        }

        .download-btn {
            display: inline-block;
            background-color: #0071e3; /* 蓝色按钮 */
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background-color: #0077ed;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,113,227,0.3);

        .file-info {
