<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRQ PORTFOLIO | 访问授权</title>
    <style>
        :root {
            --tech-cyan: #00f2ff;
            --tech-bg: #050608;
            --tech-line: rgba(0, 242, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--tech-bg);
            /* 科技感点阵背景 */
            background-image: radial-gradient(var(--tech-line) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* 核心卡片容器 */
        .main-frame {
            position: relative;
            width: 320px;
            padding: 40px;
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid var(--tech-line);
            backdrop-filter: blur(8px);
            text-align: center;
        }

        /* 扫描线动画 */
        .main-frame::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--tech-cyan);
            box-shadow: 0 0 15px var(--tech-cyan);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        h1 {
            font-size: 22px;
            letter-spacing: 5px;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 8px var(--tech-cyan);
        }

        .user-id {
            font-size: 10px;
            color: var(--tech-cyan);
            margin: 10px 0 40px 0;
            font-family: monospace;
            letter-spacing: 2px;
        }

        /* 科技风格下载按钮 */
        .btn-download {
            position: relative;
            display: inline-block;
            padding: 15px 30px;
            border: 1px solid var(--tech-cyan);
            color: var(--tech-cyan);
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            background: transparent;
        }

        .btn-download:hover {
            background: var(--tech-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--tech-cyan);
            cursor: pointer;
        }

        .footer-code {
            margin-top: 30px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="main-frame">
        <h1>WANG RUIQI</h1>
        <div class="user-id">IDENTIFIED: INDUSTRIAL DESIGNER</div>
        
        <a href="Portfolio_WangRuiqi.pdf" download="王瑞琪作品集.pdf" class="btn-download">
            DOWNLOAD PORTFOLIO
        </a>

        <div class="footer-code">
            STATUS: ENCRYPTED ACCESS<br>
            FILE_ID: PRTF_WRQ_2026
        </div>
    </div>

</body>
</html>
